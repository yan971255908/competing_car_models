# AutoPrism - Docker Compose (本地开发版)
version: '3.8'

services:
  web:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/autoprism
      - DATABASE_SYNC_URL=postgresql://postgres:postgres@postgres:5432/autoprism
      - SECRET_KEY=autoprism-dev-secret-key
      - AI_API_BASE=${AI_API_BASE:-https://api.openai.com/v1}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4o}
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=autoprism
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 可选: Redis (用于缓存和限流)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

volumes:
  postgres_data:
  # redis_data:
